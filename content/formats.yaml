formats:
  intro_title: Three ways to enter the story.
  intro_text: We do not mass-produce experiences. We stage the right scale for the right protagonist.
  intro_cta: Learn more
  intro_href: index.html#experience
  items:
    - name: Episode
      duration: 4 hours
      locations: 3 locations
      description: A compressed arc for one person, a pair, or a small group. Fast escalation. Precise emotional turn. Built for clarity, reset, or a decisive shift in perspective.
      price: "from 5,000 USD"
    - name: Feature
      duration: Full day
      locations: 7 locations
      description: A deeper city-scale narrative with more time, more layers, and a wider emotional arc. Designed for people who want the experience to unfold gradually and land harder.
      price: "from 15,000 USD"
    - name: Blockbuster
      duration: Full day
      locations: City-scale
      description: A large-format production with multiple narrative layers, moving parts, and coordinated reveals. The broadest version of the experience, built for maximum scale and shared impact.
      price: "from 50,000 USD"

