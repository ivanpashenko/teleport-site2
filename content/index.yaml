product:
  items:
    - title: You do not watch the story. You enter it.
      text: The city becomes a sequence. People become cues. Ordinary moments begin to behave like scenes, and the group realizes it is already inside the frame.
      image: assets/scale.png
      note_label: PRINCIPLE 01
      note_text: 19:12. The room stays casual. Five people already know your names.
    - title: The route moves through places that do not announce themselves.
      text: A bar. A gallery. A hotel lobby. A car waiting at the wrong entrance. Each location shifts the energy, the alliances, and the way the group reads what is happening.
      image: assets/initiation.png
      note_label: PRINCIPLE 02
      note_text: 20:03. Exit through the side door. Do not explain where you are going.
    - title: The actors do not look like actors.
      text: A bartender. A guest. A woman near the elevator. A stranger who says one precise thing and disappears. The room starts noticing patterns, but never fast enough to stay fully ahead of them.
      image: assets/glitch.png
      note_label: PRINCIPLE 03
      note_text: 20:41. He places the note on the counter and walks away before anyone asks a question.
    - title: An ordinary moment begins to unfold unexpectedly.
      text: Nothing announces itself. You are still inside a normal moment when something unusual begins to unfold. Only later do you realize the scene had already started moving around you.
      image: assets/point_of_no_return_before.png
      note_label: PRINCIPLE 04
      note_text: 21:06. She apologizes, says one of your names, and continues as if this had already happened before.
    - title: By the end, reality does not feel the same.
      text: What stays with you is not how it was done, but what it changed. The experience shifts how the day is read, how decisions are felt, and what now seems possible.
      image: assets/point_of_no_return_after.png
      note_label: PRINCIPLE 05
      note_text: 21:40. Verification is no longer the priority. Continue forward.

why:
  title: Why enter it
  text: Not entertainment. A controlled rupture in routine that reveals how people think, react, and reframe what matters.
  items:
    - title: Break the pattern
      text: For a few hours, the usual identities fall away. People are no longer entering the room as the roles they always play. Place a group inside an unfamiliar reality, and new instincts, new dynamics, and new possibilities begin to surface.
      image: assets/scale.png
      note_label: WHY 01
      note_text: Routine loses authority first. Then the person inside it changes shape.
    - title: Insight through immersion
      text: Real business insight does not come from boardrooms, workshops, or another predictable offsite. It happens when reality bends, the script breaks, and you are forced to respond differently in real time.
      image: assets/initiation.png
      note_label: WHY 02
      note_text: Strategy becomes visible only after certainty stops leading.
    - title: Private Singapore
      text: Not the city from guidebooks. A hidden Singapore reached through side streets, back rooms, private spaces, and staged coincidences. A story you can only live through — then unpack behind closed doors.
      image: assets/point_of_no_return_before.png
      note_label: WHY 03
      note_text: The city behaves differently when it has been written around you.

archive:
  title: One framework. Three different scales of reality shift.
  text: We use the same underlying mechanics to build entirely different atmospheres. Depending on your context, the experience can take one of these directions.
  items:
    - title: The Interruption
      text: 18:40. A dinner, briefing, or conference proceeds as planned until one detail lands wrong. The room keeps moving. You realize part of it is already scripted.
      image: assets/initiation.png
      meta: BUSINESS / FORMAL
    - title: The Recognition
      text: You step into an ordinary place to wait, reset, or disappear for a minute. Something inside recognizes you before it should. The day stops feeling anonymous.
      image: assets/point_of_no_return_before.png
      meta: PRIVATE / INTIMATE
    - title: Point of No Return
      text: 19:00 negotiation. 21:40 movement. The evening breaks into decisions, detours, and urgency. By then, clarity matters less than momentum.
      image: assets/point_of_no_return_after.png
      meta: NIGHT / ESCALATION

process:
  items:
    - step: "01"
      title: Screening
      text: A closed interview. We listen to your stories, ask the right questions, and identify the details that matter now. For each person in the group, we map what feels most alive, unresolved, or important at this stage of life. Our profiler turns that into material for the creative team.
    - step: "02"
      title: Adaptation
      text: We take one of our base narratives and pull your details into it. A phrase, a habit, a goal, a memory. The story starts recognizing you.
    - step: "03"
      title: Production
      text: For one day, Singapore becomes a live set. Locations activated. Cast briefed. Timing calibrated to the minute. The city still looks untouched.
    - step: "04"
      title: Revelation
      text: At the final point, the script stops. Masks come off. You see what was placed, what was real, and what changed in the process.

