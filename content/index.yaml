faq:
  title: Q&A
  items:
    - question: What is possible?
      answer: We can turn an ordinary day into a sequence that feels impossible from the inside, yet remains fully grounded in the real world. Real locations. Real timing. Hidden performers. Personal details woven into the story. The goal is not spectacle for its own sake, but a reality precise enough to shift how you feel, decide, and see.
    - question: What kind of story can I enter?
      answer: A private city mystery. A future version of your company. A personal turning point disguised as coincidence. A sequence built around memory, ambition, fear, celebration, or change. We shape the narrative around what matters in your life now.
    - question: How does it work?
      answer: It starts with a private screening interview. From there we choose the right narrative spine, adapt it with details from your world, cast the right people, secure locations, and produce the experience around you. On the day itself, Singapore behaves differently — but never obviously.
    - question: Will I know what is staged?
      answer: No. That uncertainty is part of the architecture. You may suspect certain moments. You may misread others completely. The experience works because you cannot fully tell where design ends and reality begins until the final reveal.
    - question: Who is this for?
      answer: Founders, partners, couples, private clients, and leadership teams who do not need more entertainment — they need perspective, surprise, and a controlled break from the usual script.

