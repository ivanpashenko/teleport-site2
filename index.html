<!DOCTYPE html>
<html lang="en" data-page="index">
<head>
  <link rel="icon" href="data:,">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teleport</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            display: ['Cormorant Garamond', 'serif'],
            mono: ['Special Elite', 'monospace']
          },
          colors: {
            base: 'var(--bg)',
            soft: 'var(--bg-soft)',
            primary: 'var(--text-primary)',
            faded: 'var(--text-faded)'
          },
          lineHeight: {
            tight: '1',
            relaxed: '1.625'
          },
          fontSize: {
            xs: 'var(--text-xs)',
            sm: 'var(--text-sm)',
            md: 'var(--text-md)',
            lg: 'var(--text-lg)',
            xl: 'var(--text-xl)',
            '2xl': 'var(--text-2xl)',
            '3xl': 'var(--text-3xl)',
            '4xl': 'var(--text-4xl)',
            '5xl': 'var(--text-5xl)',
            '6xl': 'var(--text-6xl)',
            hero: 'var(--text-hero)',
          },
          boxShadow: {
            film: '0 30px 80px rgba(0,0,0,0.55)'
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Cormorant+Garamond:wght@500;600;700&family=Special+Elite&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <style>
    html { background: #050505; }
    body { margin: 0; font-family: Inter, sans-serif; background: #050505; }
  </style>
</head>
<body>
  <div id="app"></div>
  <link rel="stylesheet" href="./src/styles/theme.css" />
  <script type="module" src="./src/main.js"></script>
</body>
</html>
